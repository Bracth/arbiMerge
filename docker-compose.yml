version: '3.8'

services:
  # 1. LA BASE DE DATOS (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: arbimerge-db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: arbimerge_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d arbimerge_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. EL BACKEND (Node.js + WebSockets)
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: arbimerge-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://root:rootpassword@db:5432/arbimerge_db?schema=public"
      PORT: 3000
    # QUITAMOS "ports". Dokploy se encargará de enrutar el dominio a este contenedor
    expose:
      - "3000"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # 3. EL FRONTEND (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: arbimerge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # QUITAMOS "ports: 80:80". Nginx expone el 80 internamente por defecto.
    expose:
      - "80"

volumes:
  pgdata:
